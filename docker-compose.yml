services:
  web:
    build:
      context: .
      args:
        # Build-time only — these get baked into the browser bundle.
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
    ports:
      - "3001:3000"
    environment:
      # Runtime, server-only — all optional. Omit any of these and that
      # feature degrades gracefully instead of failing (wildfires/copilot)
      # or simply isn't reachable (auth writes).
      - NASA_FIRMS_MAP_KEY=${NASA_FIRMS_MAP_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - SUPABASE_SECRET_KEY=${SUPABASE_SECRET_KEY:-}
    restart: unless-stopped
